<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions for Couples 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anuphan', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            padding: 20px;
            position: relative;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            backdrop-filter: blur(4px);
            z-index: 1;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation: floatBubble 7s infinite ease-in-out; }
        .bubble:nth-child(2) { width: 60px; height: 60px; bottom: 15%; right: 15%; background: rgba(255, 255, 255, 0.2); animation: floatBubble 9s infinite ease-in-out reverse; }
        .bubble:nth-child(3) { width: 40px; height: 40px; top: 20%; right: 5%; animation: floatBubble 6s infinite linear 1s; }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.05), 
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            background: linear-gradient(45deg, #ff6b8b, #ffdde1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #555;
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 300;
            line-height: 1.4;
        }

        .memory-img-box {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transform: scale(1.02);
            transition: transform 0.5s ease;
        }

        /* [จุดแก้ไขที่ 1] ปรับให้สเกลภาพเฉพาะคอมพิวเตอร์ที่มีเมาส์ชี้เท่านั้น */
        @media (hover: hover) {
            .memory-img-box:hover {
                transform: scale(1.05);
            }
        }

        .memory-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quiz-transition-wrapper, #winStep {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.5); 
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #4a4a4a;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; /* เอาสีไฮไลต์สีฟ้าตอนกดบน iOS ออก */
        }

        /* [จุดแก้ไขที่ 2] ใช้ @media (hover: hover) ครอบ เพื่อให้ปุ่มขยายและเปลี่ยนสีเฉพาะเมื่อใช้เมาส์ชี้ในคอมพิวเตอร์เท่านั้น บนมือถือ/iPad จะไม่ค้างแล้ว */
        @media (hover: hover) {
            .option-btn:hover:not(:disabled) {
                background: rgba(255, 255, 255, 0.9);
                transform: scale(1.03);
                box-shadow: 0 5px 15px rgba(255, 107, 139, 0.2);
                border-color: #ffb6c1;
            }
        }

        .option-btn.shake-wrong {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; 
            background: rgba(255, 214, 222, 0.9) !important;
            border-color: #ff7b8c !important;
            color: #e93563 !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0) scale(1.02); }
            20%, 80% { transform: translate3d(4px, 0, 0) scale(1.02); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0) scale(1.02); }
            40%, 60% { transform: translate3d(6px, 0, 0) scale(1.02); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        @media (hover: hover) {
            .btn-primary:hover {
                transform: translateY(-3px) scale(1.02);
                box-shadow: 0 15px 30px rgba(255, 117, 140, 0.4);
            }
        }

        .feedback-msg {
            font-size: 0.95rem;
            color: #e93563;
            font-weight: bold;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .feedback-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback-msg.success-msg {
            color: #28a745 !important;
        }

        #quizStep, #winStep { display: none; }
        
    </style>
</head>
<body>

    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="glass-container" id="mainCard">
        
        <div id="memoryStep">
            <h1>Questions for Couples 💖</h1>
            <p class="subtitle">เทอจำอะไรเกียวกับเค้าได้บ้าง<br>พร้อมเล่นเกมตอบคำถามไหม</p>
            
            <div class="memory-img-box">
                <img src="https://media1.tenor.com/m/1nIDXbABxgsAAAAC/gif-gifkk.gif">
            </div>

            <button class="btn-primary" onclick="startQuiz()">เริ่มกันเลย~</button>
        </div>

        <div id="quizStep" class="quiz-transition-wrapper">
            <h1 id="q-title">Question...</h1>
            <p class="subtitle">ลองทายใจกันดูสิว่าเค้าจำได้แค่ไหน 😉</p>
            
            <div id="questionContent" style="margin-bottom: 20px;">
                <h2 style="font-weight: 600; color: #333;" id="questionText">ข้อที่ 1:...</h2>
            </div>

            <div class="options-grid" id="optionsGrid">
            </div>

            <div class="feedback-msg" id="feedbackMsg"></div>
        </div>

        <div id="winStep">
        </div>

    </div>

    <script>
        const questions = [
            { 
                text: "เทอรักเค้าไหม ❤️", 
                options: ["รักสิ", "รักนิดหน่อย", "ไม่รู้"], 
                correct: 0,
                wrongFeedback: "หึไม่รักกันแล้วสิ ชิ😤" 
            },
            { 
                text: "เราคบกันเดือนอะไรน้า📅", 
                options: ["ตุลาคม", "กรกฎาคม", "พฤศจิกายน"], 
                correct: 1,
                wrongFeedback: "อ้าวววว ลืมวันคบแล้วหรอ น่าตีสักที่😤"
            },
            { 
                text: "เราเจอกันได้ไง?", 
                options: ["เจอกันในเกม", "เจอกันที่ห้าง", "เจอกันที่ทะเล"], 
                correct: 0,
                wrongFeedback: "เอ๋ จำผิดป่าวววน้า จำสลับกันใครหรือเปล่านะ🤫"
            },
            { 
                text: "เค้าชอบเทียวที่แบบไหน?", 
                options: ["ห้างที่คนเยอะ", "สถาที่ฮิตๆ", "ภูเขา ทะเล ที่เงียบๆ"], 
                correct: 2,
                wrongFeedback: "มั่วแล้วววจังง เค้าไม่ชอบทึ่คนเยอะๆนะ ลองนึกดีๆสิ!"
            },
            { 
                text: "คิดว่าแฟนเทอหล่อมั้ย?", 
                options: ["ไม่อะไม่หล่อเลย", "หล่อมากๆ", "หล่อนิดๆ"], 
                correct: 1,
                wrongFeedback: "อ่ออืม"
            },
            { 
                text: "เค้าชอบกินอะไร?", 
                options: ["กระเพรา", "แกงจืด", "ผัดเผ็ดปลาดุ"], 
                correct: 2,
                wrongFeedback: "อืมม.. ใช่หรือเปล่านะ อาจจะยัง"
            },
            { 
                text: "เค้าชอบสัตว์ชนิดไหนมากที่สุด?", 
                options: ["ไก่", "แมว", "ลิง"], 
                correct: 1,
                wrongFeedback: "เอ๋ นี้เทอลืมแลวหรอ"
            },
            { 
                text: "เค้าเกิดปีอะไร?", 
                options: ["2005", "2009", "2008"], 
                correct: 2,
                wrongFeedback: "ข้อนี้ยากไปหรือเปล่านะ"
            },
            { 
                text: "ปีนี้เค้าอายึเท่าไหร่", 
                options: ["18ปี", "15ปี่", "20ปี"], 
                correct: 0,
                wrongFeedback: "อาจจะยัง"
            },
            { 
                text: "ทายสิเค้ารักเทอแค่ไหน", 
                options: ["รัก", "รักมาก", "โครตรักเลยรักมากกเท่าเม็ดทราย"], 
                correct: 2,
                wrongFeedback: "อืมมม หวังไว้น้อยจัง"
            }
        ];

        const correctFeedbacks = [
            "เก่งที่สุดเลยยยย ปรบมือออ! 💖",
            "งุ้ยยย ถูกต้องนะค้าบบ น่ารักจัง ✨",
            "รักเทอจัง จำแม่นมากก 🥰",
            "แฟนใครเนี่ยยย ทำไมเก่งงี้! 👑",
            "ถูกต้องที่สุดเล้ยยย จุ๊บๆ 😘"
        ];

        let currentQuestion = 0;
        let isProcessing = false; 
        let celebrationTimer = null; 
        
        let score = 0;
        let hasWrongInCurrentQuestion = false;

        const memoryStep = document.getElementById('memoryStep');
        const quizStep = document.getElementById('quizStep');
        const winStep = document.getElementById('winStep');
        const optionsGrid = document.getElementById('optionsGrid');
        const questionText = document.getElementById('questionText');
        const feedbackMsg = document.getElementById('feedbackMsg');

        function startQuiz() {
            memoryStep.style.display = 'none';
            winStep.style.display = 'none';
            quizStep.style.display = 'block';
            quizStep.style.opacity = '1';
            quizStep.style.transform = 'translateY(0)';
            currentQuestion = 0;
            score = 0; 
            loadQuestion();
        }

        function loadQuestion() {
            feedbackMsg.classList.remove('show');
            feedbackMsg.classList.remove('success-msg'); 
            
            hasWrongInCurrentQuestion = false; 
            
            const currentQ = questions[currentQuestion];
            questionText.innerText = `ข้อที่ ${currentQuestion + 1}: ${currentQ.text}`;
            
            optionsGrid.innerHTML = ''; 
            
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = option; 
                btn.onclick = () => checkAnswer(btn, index);
                optionsGrid.appendChild(btn);
            });
            isProcessing = false;
        }

        function checkAnswer(selectedBtn, selectedIndex) {
            if (isProcessing) return;
            isProcessing = true;

            const currentQ = questions[currentQuestion];

            if (selectedIndex === currentQ.correct) {
                selectedBtn.style.backgroundColor = "#d4edda";
                selectedBtn.style.color = "#155724";
                selectedBtn.style.borderColor = "#c3e6cb";
                
                if (!hasWrongInCurrentQuestion) {
                    score++;
                }
                
                const randomCompliment = correctFeedbacks[Math.floor(Math.random() * correctFeedbacks.length)];
                feedbackMsg.innerText = randomCompliment;
                feedbackMsg.classList.add('success-msg'); 
                feedbackMsg.classList.add('show'); 

                setTimeout(() => { 
                    nextQuestion(); 
                }, 1000); 

            } else {
                selectedBtn.classList.add('shake-wrong'); 
                
                hasWrongInCurrentQuestion = true;
                
                const originalText = selectedBtn.innerText;
                selectedBtn.innerText = "ไม่ใช่ข้อนี้เป่าาา"; 

                feedbackMsg.classList.remove('success-msg'); 
                feedbackMsg.innerText = currentQ.wrongFeedback || "อ๊ะ! ลองใหม่หน่อยสิ";
                feedbackMsg.classList.add('show');

                setTimeout(() => {
                    selectedBtn.classList.remove('shake-wrong');
                    selectedBtn.innerText = originalText;
                    isProcessing = false; 
                }, 1200); 

                setTimeout(() => {
                    feedbackMsg.classList.remove('show');
                }, 2500); 
            }
        }

        function nextQuestion() {
            currentQuestion++;
            
            quizStep.style.opacity = '0';
            quizStep.style.transform = 'translateY(-15px)';
            
            setTimeout(() => {
                if (currentQuestion < questions.length) {
                    loadQuestion();
                    
                    quizStep.style.transform = 'translateY(15px)';
                    
                    setTimeout(() => {
                        quizStep.style.opacity = '1';
                        quizStep.style.transform = 'translateY(0)';
                    }, 50); 
                } else {
                    showWinScreen();
                }
            }, 400);
        }

        function showWinScreen() {
            quizStep.style.opacity = '0';
            quizStep.style.transform = 'translateY(-15px)';
            
            setTimeout(() => {
                quizStep.style.display = 'none';
                
                winStep.innerHTML = `
                    <div style="text-align:center;">
                        <h1 style="font-size: 3.5rem;">Perfect! 💖</h1>
                        <p style="margin-bottom:10px; font-size:1.1rem; color:#4a4a4a; font-weight:600;">
                            เก่งจังเลยค้าบบ เธอน่ารักทึ่สุดเลยยย🥳
                        </p>
                        <p style="margin-bottom:20px; font-size:1.2rem; color:#ff6b8b; font-weight:bold;">
                            คะแนนความรู้ใจ (ตอบถูกในครั้งแรก): ${score} / ${questions.length} ข้อ 🎯
                        </p>
                        <img src="https://media1.tenor.com/m/r0MKuFpzYMQAAAAC/%C4%91%E1%BA%B3ng-c%E1%BA%A5p.gif" 
                             style="width:100%; max-width:240px; border-radius:20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom:10px;">
                        <br>
                        <button class="btn-primary" onclick="resetQuizGame()" style="width:80%; margin-top:15px;">เล่นใหม่อีกครั้ง 🔄</button>
                    </div>`;
                
                winStep.style.display = 'block';
                winStep.style.opacity = '0';
                winStep.style.transform = 'translateY(15px)';
                
                setTimeout(() => {
                    winStep.style.opacity = '1';
                    winStep.style.transform = 'translateY(0)';
                }, 50);

                celebrationTimer = setInterval(() => {
                    if(Math.random() > 0.4) {
                        const heart = document.createElement('div');
                        heart.style.position = 'absolute';
                        heart.style.bottom = '-50px';
                        heart.style.left = Math.random() * window.innerWidth + 'px';
                        heart.innerText = ['❤️', '💖', '🥰', '💝', '💕'][Math.floor(Math.random() * 5)];
                        heart.style.fontSize = (Math.random() * 15 + 20) + 'px';
                        heart.style.zIndex = '999';
                        heart.style.pointerEvents = 'none';
                        heart.style.transition = 'transform 2.5s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 2.5s ease-out';
                        
                        document.body.appendChild(heart);
                        
                        setTimeout(() => {
                            const randomX = (Math.random() * 160 - 80);
                            heart.style.transform = `translateY(-110vh) translateX(${randomX}px) rotate(${Math.random() * 360}deg)`;
                            heart.style.opacity = '0';
                        }, 50);
                        
                        setTimeout(() => { heart.remove(); }, 2600);
                    }
                }, 150);
            }, 400);
        }

        function resetQuizGame() {
            if (celebrationTimer) {
                clearInterval(celebrationTimer);
            }

            winStep.style.opacity = '0';
            winStep.style.transform = 'translateY(-15px)';
            
            setTimeout(() => {
                winStep.style.display = 'none';
                memoryStep.style.display = 'block';
                memoryStep.style.animation = 'fadeInUp 0.6s ease-out';
            }, 400);
        }
    </script>
</body>
</html>
